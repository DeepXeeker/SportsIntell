seed: 42
device: auto

data:
  name: SportsMOT
  root: ./data/SportsMOT
  train_split: train
  val_split: val
  normalize: true

model:
  name: sportsintell
  input_dim: 8
  embed_dim: 32
  history_len: 12
  tfen_blocks: 4
  transformer_layers: 6
  attention_heads: 8
  dropout: 0.1
  use_tfen: true

loss:
  use_dmal: true
  beta: 0.4

train:
  batch_size: 16
  epochs: 50
  lr: 0.0015
  weight_decay: 0.0
  num_workers: 0

tracker:
  iou_threshold: 0.3
  max_age: 30

output:
  dir: ./outputs
  run_name: sportsmot_full
